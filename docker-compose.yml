
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  producer:
    build: ./iot-sensor-messages-producer
    depends_on:
      - mqtt
    environment:
      MQTT_BROKER: mqtt
      ANOMALY_PROBABILITY: ${ANOMALY_PROBABILITY}

  mqtt_to_kafka:
    build: ./iot-mqtt-to-kafka
    depends_on:
      - mqtt
      - kafka
      - db
    environment:
      MQTT_BROKER: mqtt
      KAFKA_BROKER: kafka:9092
      DB_HOST: db
      POSTGRES_DB: sensors
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

  db:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_DB: sensors
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    depends_on:
      - kafka
    ports:
      - "9001:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092

  spark:
    image: apache/spark:3.5.0
    container_name: spark
    environment:
      - SPARK_MODE=master
    ports:
      - "4040:4040"

  spark-job:
    build: ./spark-streaming
    container_name: spark-job
    depends_on:
      - kafka

  alerts-consumer:
    build: ./alerts-consumer
    depends_on:
      - kafka
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      CHAT_ID: ${CHAT_ID}
      DB_HOST: db
      POSTGRES_DB: sensors
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
  api:
    build: ./api-service
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      POSTGRES_DB: sensors
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

volumes:
  db_data:
  grafana_data: